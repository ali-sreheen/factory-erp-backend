services:
  - type: web
    name: factory-erp-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
    disk:
      name: uploads-disk
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10
